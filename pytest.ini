[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra -q
asyncio_mode = auto

# Markers — keep integration off by default so plain ``pytest`` runs
# fast offline tests only. Integration suite needs models + a live
# server and is gated behind ``pytest -m integration`` or
# ``pytest tests/integration``.
markers =
    integration: spin up a real uvicorn + hit the live HTTP/WS endpoints
